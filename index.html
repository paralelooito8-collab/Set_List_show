  <meta charset="UTF-8">

  <title>SET LIST - Introdução</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
      padding: 40px 20px;
    }

    h1 {
      font-size: 4rem;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(45deg, #00d4ff, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .flags-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px 0;
    }

    .flag-card {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      padding: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .flag-card:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.8);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2);
    }

    .flag-card h3 {
      font-size: 1.5rem;
      margin-bottom: 10px;
      color: #00d4ff;
    }

    .flag-card p {
      font-size: 0.9rem;
      color: #ccc;
      line-height: 1.6;
    }

    /* Modal Overlay */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      animation: fadeIn 0.3s ease;
      overflow-y: auto;
      padding: 0;
    }

    .overlay.active {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .flag-content {
      background: rgba(26, 26, 46, 0.95);
      border: none;
      border-radius: 0;
      padding: 50px;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .flag-content h2 {
      font-size: 3rem;
      color: #00d4ff;
      margin-bottom: 40px;
      border-bottom: 2px solid rgba(0, 212, 255, 0.3);
      padding-bottom: 20px;
    }

    .flag-content p {
      font-size: 1.3rem;
      line-height: 2;
      color: #e0e0e0;
      margin-bottom: 30px;
      white-space: pre-wrap;
      word-wrap: break-word;
      column-count: 2;
      column-gap: 40px;
      column-rule: 1px solid rgba(0, 212, 255, 0.2);
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 60px;
      padding-top: 30px;
      border-top: 2px solid rgba(0, 212, 255, 0.3);
      gap: 20px;
      flex-wrap: wrap;
    }

    button {
      background: linear-gradient(45deg, #00d4ff, #0099ff);
      color: #000;
      border: none;
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .close-btn {
      background: rgba(255, 100, 100, 0.8);
      color: #fff;
      padding: 10px 20px;
      font-size: 0.9rem;
    }

    .close-btn:hover {
      background: rgba(255, 100, 100, 1);
    }

    .flag-counter {
      color: #aaa;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
      flex: 1;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2.5rem;
        letter-spacing: 3px;
      }

      .flag-content {
        padding: 30px;
      }

      .flag-content h2 {
        font-size: 1.8rem;
      }

      .flag-content p {
        font-size: 1rem;
      }

      button {
        padding: 10px 20px;
        font-size: 0.9rem;
      }
    }
  </style>

    let currentFlagIndex = 0;

    function initializeFlags() {
      const flagsGrid = document.getElementById('flagsGrid');
      flags.forEach((flag, index) => {
        const card = document.createElement('div');
        card.className = 'flag-card';
        card.innerHTML = `<h3>${flag.title}</h3><p>${flag.text.substring(0, 100)}...</p>`;
        card.onclick = () => openFlag(index);
        flagsGrid.appendChild(card);
      });
    }

    function openFlag(index) {
      currentFlagIndex = index;
      const flag = flags[index];
      document.getElementById('modalTitle').textContent = flag.title;
      document.getElementById('modalText').textContent = flag.text;
      document.getElementById('flagCounter').textContent = `${index + 1} de ${flags.length}`;
      
      updateNavButtons();
      document.getElementById('overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeFlag() {
      document.getElementById('overlay').classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    function nextFlag() {
      if (currentFlagIndex < flags.length - 1) {
        openFlag(currentFlagIndex + 1);
      }
    }

    function previousFlag() {
      if (currentFlagIndex > 0) {
        openFlag(currentFlagIndex - 1);
      }
    }

    function updateNavButtons() {
      document.getElementById('prevBtn').disabled = currentFlagIndex === 0;
      document.getElementById('nextBtn').disabled = currentFlagIndex === flags.length - 1;
    }

    // Navegação por teclado
    document.addEventListener('keydown', (e) => {
      const overlay = document.getElementById('overlay');
      if (!overlay.classList.contains('active')) return;

      if (e.key === 'ArrowLeft') previousFlag();
      if (e.key === 'ArrowRight') nextFlag();
      if (e.key === 'Escape') closeFlag();
    });

    // Fechar ao clicar fora do conteúdo
    document.getElementById('overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('overlay')) {
        closeFlag();
      }
    });

    // Inicializar
    initializeFlags();
  </script>
