    let currentFlagIndex = 0;

    function renderFlags() {
      const flagsGrid = document.getElementById('flagsGrid');
      flagsGrid.innerHTML = '';
      flags.forEach((flag, index) => {
        const card = document.createElement('div');
        card.className = 'flag-card';
        card.innerHTML = `<h3>${flag.title}</h3><p>${flag.text.substring(0, 100)}...</p>`;
        card.onclick = () => openFlag(index);
        flagsGrid.appendChild(card);
      });
    }

    function openFlag(index) {
      currentFlagIndex = index;
      const flag = flags[index];
      document.getElementById('modalTitle').textContent = flag.title;
      document.getElementById('modalText').textContent = flag.text;
      document.getElementById('flagCounter').textContent = `${index + 1} de ${flags.length}`;
      document.getElementById('overlay').classList.add('active');
      updateButtonStates();
    }

    function closeFlag() {
      document.getElementById('overlay').classList.remove('active');
    }

    function nextFlag() {
      if (currentFlagIndex < flags.length - 1) {
        openFlag(currentFlagIndex + 1);
      }
    }

    function previousFlag() {
      if (currentFlagIndex > 0) {
        openFlag(currentFlagIndex - 1);
      }
    }

    function updateButtonStates() {
      document.getElementById('prevBtn').disabled = currentFlagIndex === 0;
      document.getElementById('nextBtn').disabled = currentFlagIndex === flags.length - 1;
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('overlay').classList.contains('active')) {
        if (e.key === 'ArrowRight') nextFlag();
        if (e.key === 'ArrowLeft') previousFlag();
        if (e.key === 'Escape') closeFlag();
      }
    });

    // Initialize
    renderFlags();
  </script>
